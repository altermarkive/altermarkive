# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      all-deps:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/utilities"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
